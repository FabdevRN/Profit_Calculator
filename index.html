<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit Master Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 font-sans antialiased">
    <div id="lockScreen" class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg text-center mt-12">
        <div class="text-red-500 text-5xl mb-4">🔒</div>
        <h2 class="text-xl font-bold text-gray-800 mb-2">Invalid Access Link</h2>
        <p class="text-sm text-gray-500">Please use your unique company link.</p>
    </div>

    <div id="appContainer" class="hidden max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg mt-6">
        <div class="flex items-center justify-between border-b pb-4 mb-6">
            <div>
                <h1 class="text-2xl font-black text-gray-900">PROFIT MASTER</h1>
                <p id="companyName" class="text-xs font-bold text-blue-600 uppercase"></p>
            </div>
            <div class="h-10 w-10 bg-gray-800 rounded-lg flex items-center justify-center text-white font-black text-xl">🛠️</div>
        </div>
        
        <div id="summary" class="p-6 rounded-xl text-white shadow-lg mb-6 transition-colors duration-300 bg-green-600">
            <p class="text-xs font-bold opacity-80 uppercase tracking-widest">Net Profit</p>
            <h2 id="netProfit" class="text-4xl font-black mb-2">$0.00</h2>
            <div class="flex justify-between text-sm font-bold pt-2 border-t border-white/20">
                <p>Gross: <span id="gMargin">0.0</span>%</p>
                <p>Net: <span id="nMargin">0.0</span>%</p>
            </div>
        </div>

        <div class="space-y-4">
            <div>
                <select id="commType" class="w-full h-12 p-3 border rounded-lg bg-white">
                    <option value="percent">Percentage (%)</option>
                    <option value="flat">Flat Fee ($)</option>
                </select>
                <p class="text-xs font-bold text-gray-400 mt-1">Commission Type</p>
            </div>
            <div id="inputFieldsContainer" class="grid grid-cols-2 gap-4"></div>
            <button onclick="resetCalculator()" class="w-full py-4 bg-gray-200 text-gray-700 rounded-lg font-bold">RESET</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            companyLabel: "YOUR COMPANY NAME HERE", 
            validTokenHash: "aHZhY19zZWN1cmVfMjAyNg==" 
        };

        const FIELDS = [
            { id: 'price', label: 'Price ($)' }, { id: 'commVal', label: 'Commission Value' },
            { id: 'equipment', label: 'Equip ($)' }, { id: 'materials', label: 'Materials Cost ($)' },
            { id: 'sub', label: 'Sub/Permit ($)' }, { id: 'techHours', label: 'Tech Hrs' },
            { id: 'techRate', label: 'Rate ($)' }, { id: 'driveTime', label: 'Drive Hrs' },
            { id: 'fleetCost', label: 'Fleet ($)' }, { id: 'overhead', label: 'Overhead ($)' }
        ];

        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            if (btoa(params.get('license') || '') === CONFIG.validTokenHash) {
                document.getElementById('lockScreen').classList.add('hidden');
                document.getElementById('appContainer').classList.remove('hidden');
                document.getElementById('companyName').innerText = CONFIG.companyLabel;
                
                // Inject input fields cleanly before running calculations
                const container = document.getElementById('inputFieldsContainer');
                container.innerHTML = FIELDS.map(f => `
                    <div>
                        <label class="text-[9px] font-bold uppercase text-gray-400">${f.label}</label>
                        <input type="number" id="${f.id}" oninput="calculate()" class="w-full h-10 p-2 border rounded-lg" placeholder="0">
                    </div>
                `).join('');
                
                document.getElementById('commType').addEventListener('change', calculate);
                calculate();
            }
        });

        const fmt = (num) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(num);

        function calculate() {
            const get = (id) => {
                const el = document.getElementById(id);
                if (!el) return 0;
                let val = parseFloat(el.value) || 0;
                if (val > 99000000) { val = 99000000; el.value = val; }
                return val;
            };

            const price = get('price');
            const commType = document.getElementById('commType').value;
            const commVal = get('commVal');
            const commPaid = commType === 'percent' ? price * (commVal / 100) : commVal;
            
            const direct = get('equipment') + get('materials') + get('sub') + (get('techHours') * get('techRate')) + commPaid;
            const overhead = (get('driveTime') * get('fleetCost')) + get('overhead');
            const net = price - direct - overhead;
            
            // Handle math for division-by-zero safely when fields are blank
            const grossMargin = price > 0 ? ((price - direct) / price * 100) : 0;
            const netMargin = price > 0 ? (net / price * 100) : 0;

            document.getElementById('netProfit').innerText = fmt(net);
            document.getElementById('gMargin').innerText = grossMargin.toFixed(1);
            document.getElementById('nMargin').innerText = netMargin.toFixed(1);
            
            const card = document.getElementById('summary');
            if (netMargin < 10) {
                card.className = "p-6 rounded-xl text-white shadow-lg mb-6 transition-colors duration-300 bg-red-600";
            } else if (netMargin < 20) {
                card.className = "p-6 rounded-xl text-white shadow-lg mb-6 transition-colors duration-300 bg-amber-500";
            } else {
                card.className = "p-6 rounded-xl text-white shadow-lg mb-6 transition-colors duration-300 bg-green-600";
            }
        }

        function resetCalculator() {
            FIELDS.forEach(f => {
                const el = document.getElementById(f.id);
                if (el) el.value = '';
            });
            calculate();
        }
    </script>
</body>
</html>
